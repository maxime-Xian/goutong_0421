types:
  Agent:
    required: [name]
    properties:
      id: { type: string }
      name: { type: string }
  Person:
    required: [name]
    properties:
      id: { type: string }
      name: { type: string }
      email: { type: string, optional: true }
      phone: { type: string, optional: true }
  Skill:
    required: [name, version]
    properties:
      id: { type: string }
      name: { type: string }
      version: { type: string }
  CronJob:
    required: [name, schedule_expr]
    properties:
      id: { type: string }
      name: { type: string }
      schedule_expr: { type: string }
      tz: { type: string, optional: true }
      enabled: { type: boolean }
      status: { type: string, enum: [ok, error, unknown], optional: true }
      error_message: { type: string, optional: true }
  CapabilityScore:
    required: [capability_name, score]
    properties:
      id: { type: string }
      capability_name: { type: string }
      score: { type: number }
      agent_id: { type: string }
      timestamp: { type: string }
